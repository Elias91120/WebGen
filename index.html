    <title>WebGen - Next Gen Digital Agency</title>
    <!-- Encoded SVG Favicon for "WG" logo (White W, Purple G) -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              indigo: {
                50: '#eef2ff',
                100: '#e0e7ff',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                900: '#312e81',
                950: '#1e1b4b',
              },
              slate: {
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              }
            },
            animation: {
              'blob': 'blob 10s infinite',
              'tilt': 'tilt 10s infinite linear',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              tilt: {
                '0%, 50%, 100%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(1deg)' },
                '75%': { transform: 'rotate(-1deg)' },
              },
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Slate 950 */
            color: #f8fafc;
        }
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
          background: #334155; 
          border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #475569; 
        }
        html {
          scroll-behavior: smooth;
        }
        
        .glass-panel {
            position: relative;
            background: rgba(2, 6, 23, 0.70);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; /* Ensure overflow is hidden for inner blur effects */
            isolation: isolate; /* Create new stacking context */
        }

        /* Subtle Light Leak Blur Effect using filter: blur() */
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: -50%; /* Extend well beyond bounds for smooth diffusion */
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 60%),
                        radial-gradient(circle at bottom right, rgba(79, 70, 229, 0.1), transparent 50%);
            transform: translate(-25%, -25%);
            filter: blur(40px); /* Stronger blur for smoother gradient */
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: -1; 
        }
        
        .glass-panel:hover::before {
            opacity: 1;
        }
        
        .glass-panel:hover {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(24px); /* Increased background blur */
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3); /* Premium glow shadow */
        }
        
        .glass-button {
            background: rgba(79, 70, 229, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }
        
        .glass-button:hover {
            background: rgba(79, 70, 229, 0.4);
            border-color: rgba(99, 102, 241, 0.8);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
    </style>
