    <style>
        :root {
          --brand-bg: #08090d;
          --brand-cyan: #22d3ee;
          --brand-lime: #a3e635;
          --brand-violet: #a78bfa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-bg);
            color: #f8fafc;
        }
        .font-mono {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-feature-settings: "calt" 1, "ss01" 1;
        }
        .font-display {
            font-family: 'Inter', sans-serif;
            font-feature-settings: normal;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
          width: 10px;
          height: 10px;
        }
        ::-webkit-scrollbar-track {
          background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
          background: linear-gradient(180deg, #22d3ee33, #a3e63533);
          border-radius: 6px;
          border: 2px solid #0d1117;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: linear-gradient(180deg, #22d3ee66, #a3e63566);
        }
        html {
          scroll-behavior: smooth;
        }

        /* Glass panel */
        .glass-panel {
            position: relative;
            background: rgba(13, 17, 23, 0.66);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            overflow: hidden;
            isolation: isolate;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(34,211,238,0.045), transparent 60%),
                        radial-gradient(circle at bottom right, rgba(163, 230, 53, 0.05), transparent 50%);
            transform: translate(-25%, -25%);
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: -1;
        }

        .glass-panel:hover::before {
            opacity: 1;
        }

        .glass-panel:hover {
            background: rgba(13, 17, 23, 0.78);
            border: 1px solid rgba(34, 211, 238, 0.18);
            transform: translateY(-3px);
            box-shadow: 0 22px 55px -18px rgba(34, 211, 238, 0.18);
        }

        /* Tactile : pas de “lift” ni halo au tap — rendu plus léger sur téléphone */
        @media (hover: none) {
          .glass-panel:hover,
          .glass-panel:active {
            transform: none;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
            background: rgba(13, 17, 23, 0.66);
            border: 1px solid rgba(255, 255, 255, 0.09);
          }
          .glass-panel:hover::before,
          .glass-panel:active::before {
            opacity: 0;
          }
        }

        .glass-button {
            background: rgba(34, 211, 238, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(34, 211, 238, 0.4);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            background: rgba(34, 211, 238, 0.25);
            border-color: rgba(34, 211, 238, 0.8);
            box-shadow: 0 0 24px rgba(34, 211, 238, 0.45);
        }

        /* IDE window-style card title bar */
        .ide-bar {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 8px 12px;
          background: rgba(0, 0, 0, 0.35);
          border-bottom: 1px solid rgba(255, 255, 255, 0.06);
          font-family: 'JetBrains Mono', ui-monospace, monospace;
          font-size: 11px;
          color: #94a3b8;
        }
        .ide-bar .dot {
          width: 10px;
          height: 10px;
          border-radius: 999px;
          display: inline-block;
        }

        /* Legacy scanline utility kept inactive by default */
        .scanlines::before {
          content: '';
          position: fixed;
          inset: 0;
          pointer-events: none;
          background-image: repeating-linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.025) 0px,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px,
            transparent 3px
          );
          z-index: 60;
          mix-blend-mode: overlay;
          opacity: 0;
        }

        /* Neon glow utilities */
        .glow-cyan {
          box-shadow: 0 0 24px rgba(34, 211, 238, 0.45), 0 0 1px rgba(34, 211, 238, 0.6);
        }
        .glow-lime {
          box-shadow: 0 0 24px rgba(163, 230, 53, 0.4), 0 0 1px rgba(163, 230, 53, 0.6);
        }
        .text-glow-cyan {
          text-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
        }
        .text-glow-lime {
          text-shadow: 0 0 12px rgba(163, 230, 53, 0.55);
        }

        /* Blinking caret used in the wordmark logo / hero */
        .caret {
          display: inline-block;
          width: 0.55ch;
          height: 1em;
          vertical-align: -0.12em;
          background: var(--brand-lime);
          margin-left: 2px;
          animation: caret-blink 1s steps(2, end) infinite;
        }
        @keyframes caret-blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }

        /* Subtle background grid */
        .grid-dust {
          background-image:
            linear-gradient(rgba(148, 163, 184, 0.045) 1px, transparent 1px),
            linear-gradient(90deg, rgba(148, 163, 184, 0.045) 1px, transparent 1px);
          background-size: 64px 64px;
          background-position: -1px -1px;
        }
    </style>
