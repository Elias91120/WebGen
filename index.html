    <script type="application/ld+json">

        "founders": [
          { "@type": "Person", "name": "Elias Eloumi" },

          { "@type": "Person", "name": "Charles Garbus" }
        ],
        "contactPoint": {
          "@type": "ContactPoint",

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist Variable', 'Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
              display: ['Geist Variable', 'Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                bg: '#08090d',
                surface: '#0d1117',
                raised: '#12161e',
                muted: '#161b22',
                line: '#1f2937',
                cyan: '#22d3ee',
                lime: '#a3e635',
                text: '#e8edf2',
                soft: '#94a3b8',
              },
            },
            transitionTimingFunction: {
              'out-strong': 'cubic-bezier(0.23, 1, 0.32, 1)',
              'in-out-strong': 'cubic-bezier(0.77, 0, 0.175, 1)',
            },
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --brand-bg: #08090d;
          --brand-surface: #0d1117;
          --brand-raised: #12161e;
          --brand-cyan: #22d3ee;
          --brand-lime: #a3e635;
          --brand-text: #e8edf2;
          --brand-soft: #94a3b8;
          --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
          --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
        }

        body {
            font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, sans-serif;
            background-color: var(--brand-bg);
            color: var(--brand-text);
            -webkit-font-smoothing: antialiased;
        }
        .font-mono {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-feature-settings: "calt" 1, "ss01" 1;
        }
        .font-display {
            font-family: 'Geist Variable', Geist, ui-sans-serif, system-ui, sans-serif;
            letter-spacing: -0.03em;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb {
          background: #243041;
          border-radius: 999px;
          border: 2px solid #0d1117;
        }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        html { scroll-behavior: smooth; }
        @media (prefers-reduced-motion: reduce) {
          html { scroll-behavior: auto; }
        }

        .glass-nav {
          background: rgba(13, 17, 23, 0.78);
          backdrop-filter: blur(18px);
          -webkit-backdrop-filter: blur(18px);
          border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-primary {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 0.5rem;
          padding: 0.75rem 1.5rem;
          border-radius: 9999px;
          background: #22d3ee;
          color: #08090d;
          font-weight: 600;
          font-size: 0.9375rem;
          transition: transform 160ms var(--ease-out), background 200ms var(--ease-out);
        }
        .btn-primary:hover { background: #67e8f9; }
        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 0.5rem;
          padding: 0.75rem 1.25rem;
          border-radius: 9999px;
          background: transparent;
          color: var(--brand-text);
          font-weight: 500;
          font-size: 0.9375rem;
          border: 1px solid rgba(255, 255, 255, 0.12);
          transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out), transform 160ms var(--ease-out);
        }
        .btn-secondary:hover {
          border-color: rgba(34, 211, 238, 0.45);
          background: rgba(255, 255, 255, 0.04);
        }
        .btn-secondary:active { transform: scale(0.97); }

        .double-bezel {
          padding: 0.375rem;
          border-radius: 1.75rem;
          background: rgba(255, 255, 255, 0.04);
          border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .double-bezel-inner {
          border-radius: calc(1.75rem - 0.375rem);
          overflow: hidden;
          background: #0d1117;
          border: 1px solid rgba(255, 255, 255, 0.06);
          box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
        }

        .surface-card {
          background: rgba(13, 17, 23, 0.72);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 1.25rem;
        }

        .bg-grid-fade {
          background-image:
            linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
          background-size: 72px 72px;
          mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black 20%, transparent 75%);
        }
    </style>
</head>
  <body class="bg-[#08090d] text-[#e8edf2] antialiased selection:bg-cyan-400/30 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
